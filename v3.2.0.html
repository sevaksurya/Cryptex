<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Encryption and Decryption</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@300&display=swap');

        body {
            font-family: 'Inconsolata', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 0;
            overflow: auto;
        }
        .hacker-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: linear-gradient(to right, rgba(0, 255, 0, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
            background-size: 10px 10px;
            z-index: 1;
        }

        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

            .matrix-rain canvas {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
            }

        .container {
            background-color: #0d1117;
            padding: 20px;
            box-shadow: 0 0 10px #0f0;
            border: 2px solid #0f0;
            border-radius: 10px;
            max-width: 600px;
            width: 100%;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            overflow: auto; /* Added */
            max-height: 80vh; /* Added */
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #0f0;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0, 0 0 40px #0f0;
            animation: flicker 1.5s infinite alternate;
        }

        /* Additional styles remain unchanged */
        @keyframes flicker {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }

            100% {
                opacity: 1;
            }
        }

        p {
            margin-bottom: 20px;
            color: #c9d1d9;
        }

        textarea,
        input[type="text"] {
            width: calc(100% - 20px);
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #c9d1d9;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            outline: none;
            font-size: 16px;
        }

            textarea:focus,
            input[type="text"]:focus {
                border-color: #00ff00;
                box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            }

        button {
            width: calc(100% - 20px);
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            cursor: pointer;
            background-color: #000;
            color: #00ff00;
            transition: background-color 1.5s, color 1.5s;
            font-size: 16px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

            button:hover {
                background-color: #00ff00;
                color: #000;
            }

            button:before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 255, 0, 0.2);
                transition: left 1.5s;
                z-index: -1;
            }

            button:hover:before {
                left: 0;
            }

        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #00ff00;
            background-color: #1e1e1e;
            border-radius: 4px;
            word-wrap: break-word;
            color: #c9d1d9;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            text-align: left;
            white-space: pre-wrap;
            max-height: 150px;
            overflow-y: auto;
        }

        .glow-text {
            animation: glowing 1s linear infinite;
            font-family:Garamond;
            font-size:40px;
        }

        @keyframes glowing {
            0% {
                text-shadow: 0 0 5px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
            }

            50% {
                text-shadow: 0 0 20px #00ff00, 0 0 30px #00ff00, 0 0 20px #00ff00;
            }

            100% {
                text-shadow: 0 0 10px #00ff00, 0 0 10px #00ff00, 0 0 15px #00ff00;
            }
        }

        .loading-text {
            display: none;
            color: #00ff00;
            margin-top: 10px;
            animation: loading 2s linear infinite;
        }

        @keyframes loading {
            0% {
                content: 'Encrypting...';
            }

            50% {
                content: 'Encrypting';
            }

            100% {
                content: 'Encrypting...';
            }
        }

        .output-container {
            display: none;
        }

        .console-output {
            color: #00ff00;
            margin-top: 10px;
            text-align: left;
            white-space: pre-line;
            max-height: 150px;
            overflow-y: auto;
            padding: 10px;
            background-color: #1e1e1e;
            border-radius: 4px;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 4;
        }

        .terminal {
            border-radius: 4px;
            background: #000;
            padding: 20px;
            color: #00ff00;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.7);
            position: relative;
            max-height: 150px;
            overflow-y: auto;
        }

            .terminal:before {
                content: '';
                display: block;
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                pointer-events: none;
                background: linear-gradient(90deg, rgba(0, 255, 0, 0.1) 1px, transparent 1px);
                background-size: 3px 3px;
                animation: scanline 1s infinite linear;
            }

        @keyframes scanline {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-100%);
            }
        }

        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(0deg, transparent 50%, rgba(0, 255, 0, 0.3) 51%, transparent 52%);
            background-size: 100% 3px;
            animation: scanline 2s infinite linear;
        }

                textarea,
        input[type="text"],
        input[type="password"] {
            width: calc(100% - 20px);
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #00ff00;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #c9d1d9;
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.5);
            outline: none;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        textarea:focus,
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .typing-animation {
            overflow: hidden;
            white-space: nowrap;
            margin: 0 auto;
            border-right: 2px solid #00ff00; /* Cursor effect */
            animation: typing 2s steps(40, end), blink-caret 0.75s step-end infinite;
        }

        @keyframes typing {
            from {
                width: 0;
            }

            to {
                width: 100%;
            }
        }

        @keyframes blink-caret {
            from, to {
                border-color: transparent;
            }

            50% {
                border-color: #00ff00;
            }
        }

        #key {
            width: 150px; /* Set the width of the input box */
            text-align: center; /* Center align text */
            margin: 10px auto; /* Center the input box */
            font-size: 15px; /* Reduced font size for placeholder */
        }

        .encrypt,
        .decrypt {
            width: 130px;
            height:40px;
            margin: 10px auto;
            font-size: 17px; /* Reduce font size for buttons */
            font-family:Courier New, Courier, monospace;
            font-weight:bold;
        }

    </style>
    <!-- Include CryptoJS Library -->
    <script src="https://cdn.jsdelivr.net/npm/crypto-js@4.1.1/crypto-js.js"></script>
</head>
<body>
    <div class="matrix-rain"></div>
    <div class="hacker-grid"></div>
    <div class="animated-background"></div>
    <div class="container">
        <!-- Content remains unchanged -->
        <h1 class="glow-text">Text Encryption and Decryption</h1>
        <p>Use this tool to securely encrypt and decrypt your text.</p>
        <textarea id="inputText" placeholder="Enter text here..."></textarea>
        <input type="password" id="key" placeholder="Encryption key !">
        <div></div>
        <button class="encrypt" onclick="encryptText()">Encrypt</button> <!-- Padlock icon -->
        <button class="decrypt" onclick="decryptText()">Decrypt</button> <!-- Unlocked padlock icon -->
        <div class="loading-text" id="loadingText"></div>
        <div class="output-container">
            <div class="result terminal" id="outputText"></div>
            <div class="console-output" id="consoleOutput"></div>
            <div class="scanline"></div>
        </div>
    </div>

    <script>
        // Matrix rain effect
        function matrixRain() {
            var c = document.createElement('canvas');
            var ctx = c.getContext('2d');
            document.body.appendChild(c);

            // Making the canvas full screen
            c.height = window.innerHeight;
            c.width = window.innerWidth;

            // Characters used for the matrix effect
            var matrixChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789@#$%^&*()*&^%+-/~{[|`]}';
            matrixChars = matrixChars.split('');

            var font_size = 10;
            var columns = c.width / font_size; // Number of columns for the rain
            var drops = [];
            for (var x = 0; x < columns; x++)
                drops[x] = 1;

            // Drawing the characters
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.04)';
                ctx.fillRect(0, 0, c.width, c.height);

                ctx.fillStyle = '#0F0'; // Green text
                ctx.font = font_size + 'px arial';
                for (var i = 0; i < drops.length; i++) {
                    var text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
                    ctx.fillText(text, i * font_size, drops[i] * font_size);

                    if (drops[i] * font_size > c.height && Math.random() > 0.975)
                        drops[i] = 0;

                    drops[i]++;
                }
            }

            setInterval(draw, 33);
        }

        matrixRain();

        function typeText(element, text, speed = 100) {
            let i = 0;
            const typing = setInterval(() => {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typing);
                }
            }, speed);
        }

        // Encryption and decryption functions remain unchanged
        function showLoading(text) {
            const loadingText = document.getElementById('loadingText');
            loadingText.innerText = text;
            loadingText.style.display = 'block';
        }

        function hideLoading() {
            const loadingText = document.getElementById('loadingText');
            loadingText.style.display = 'none';
        }

        function logToConsole(text) {
            const consoleOutput = document.getElementById('consoleOutput');
            consoleOutput.innerText += text + '\n';
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }

        function encryptText() {
            const text = document.getElementById('inputText').value;
            const key = document.getElementById('key').value;
            if (text && key) {
                const encryptedText = document.getElementById('outputText');
                encryptedText.innerText = ''; // Clear existing text
                showLoading('Encrypting...');
                setTimeout(() => {
                    const encrypted = CryptoJS.AES.encrypt(text, key).toString();
                    hideLoading();
                    logToConsole('Encryption successful.');
                    document.querySelector('.output-container').style.display = 'block';
                    typeText(encryptedText, encrypted);
                }, 2000);
            } else {
                alert('Please enter both text and key');
            }
        }

        function decryptText() {
            const encryptedText = document.getElementById('inputText').value;
            const key = document.getElementById('key').value;
            if (encryptedText && key) {
                const decryptedText = document.getElementById('outputText');
                decryptedText.innerText = ''; 
                showLoading('Decrypting...');
                setTimeout(() => {
                    try {
                        const decrypted = CryptoJS.AES.decrypt(encryptedText, key);
                        const plaintext = decrypted.toString(CryptoJS.enc.Utf8);
                        hideLoading();
                        logToConsole('Decryption successful.');
                        document.querySelector('.output-container').style.display = 'block';
                        typeText(decryptedText, plaintext ? plaintext : 'Invalid decryption key or text');
                    } catch (e) {
                        hideLoading();
                        logToConsole('Decryption failed: ' + e.message);
                        document.querySelector('.output-container').style.display = 'block';
                        typeText(decryptedText, 'Invalid decryption key or text');
                    }
                }, 2000);

            } else {
                alert('Please enter both encrypted text and key');
            }
        }
    </script>
</body>
</html>
